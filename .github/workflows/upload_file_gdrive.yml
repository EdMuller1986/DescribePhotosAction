name: Upload file to Google Drive

on:
  workflow_dispatch:
    inputs:
      hash:
        description: 'Хэш'
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload:
    name: Upload to Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
      GOOGLE_DRIVE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_OAUTH_CREDENTIALS }}
      GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
      GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Download via hash
        run: |
          mkdir -p download
          cd download
          aria2c --seed-time=0 --bt-metadata-only=true --bt-save-metadata=true "${{ inputs.hash }}" || true
          aria2c --seed-time=0 --dir=. "${{ inputs.hash }}"

      - name: Upload to Google Drive
        run: |
          python3 - << 'EOF'
import os
import json
from google.oauth2.credentials import Credentials
from googleapiclient.discovery import build
from googleapiclient.http import MediaFileUpload

creds_data = os.getenv('GOOGLE_DRIVE_OAUTH_CREDENTIALS')
if creds_data:
    creds_info = json.loads(creds_data)
    creds = Credentials.from_authorized_user_info(creds_info)
else:
    # Fallback на service account если нужно
    print("Используйте GOOGLE_DRIVE_OAUTH_CREDENTIALS")
    exit(1)

service = build('drive', 'v3', credentials=creds)

folder_id = 'root'

for root, dirs, files in os.walk('download'):
    for file in files:
        file_path = os.path.join(root, file)
        file_metadata = {'name': file, 'parents': [folder_id]}
        media = MediaFileUpload(file_path, resumable=True)
        uploaded_file = service.files().create(body=file_metadata, media_body=media, fields='id').execute()
        print(f'Загружен: {file} -> {uploaded_file.get("id")}')
EOF
