name: Upload file to Google Drive

on:
  workflow_dispatch:
    inputs:
      hash:
        description: 'Хэш (оставь пустым для dry run)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  upload:
    name: Upload to Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
      GOOGLE_DRIVE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_OAUTH_CREDENTIALS }}
      GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
      GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN }}
      INPUT_HASH: ${{ inputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3-pip
          pip3 install --user google-api-python-client google-auth

      - name: Download via hash
        run: |
          mkdir -p download
          cd download
          if [ -z "${INPUT_HASH}" ]; then
            echo "Dry run mode: скачиваем тестовый файл 100MB"
            aria2c --seed-time=0 "https://speed.hetzner.de/100MB.bin" -o test_100mb.bin
          else
            echo "Скачивание по хэшу: ${INPUT_HASH}"
            aria2c --seed-time=0 --bt-metadata-only=true --bt-save-metadata=true "${INPUT_HASH}" || true
            aria2c --seed-time=0 --dir=. "${INPUT_HASH}"
          fi

      - name: Upload to Google Drive
        run: python3 scripts/upload_to_gdrive.py          pip3 install --user google-api-python-client google-auth

      - name: Download via hash
        run: |
          mkdir -p download
          cd download
          if [ -z "$INPUT_HASH" ]; then
            echo "Dry run mode: скачиваем тестовый файл 100MB"
            aria2c --seed-time=0 "https://speed.hetzner.de/100MB.bin" -o test_100mb.bin
          else
            echo "Скачивание по хэшу: $INPUT_HASH"
            aria2c --seed-time=0 --bt-metadata-only=true --bt-save-metadata=true "$INPUT_HASH" || true
            aria2c --seed-time=0 --dir=. "$INPUT_HASH"
          fi

      - name: Upload to Google Drive
        run: python3 scripts/upload_to_gdrive.py      - name: Download via hash
        run: |
          mkdir -p download
          cd download
          aria2c --seed-time=0 --bt-metadata-only=true --bt-save-metadata=true "${{ inputs.hash }}" || true
          aria2c --seed-time=0 --dir=. "${{ inputs.hash }}"

      - name: Upload to Google Drive
