name: Upload file to Google Drive

on:
  workflow_dispatch:
    inputs:
      hash:
        description: "Хэш или magnet-ссылка. Оставь пустым для dry run"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  upload:
    name: Upload to Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GOOGLE_DRIVE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_OAUTH_CREDENTIALS }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      INPUT_HASH: ${{ inputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3-pip
          pip3 install --user google-api-python-client google-auth google-auth-oauthlib

      - name: Download file
        run: |
          mkdir -p download
          cd download

          if [ -z "${INPUT_HASH}" ]; then
            echo "Dry run mode: скачиваем тестовый файл"
            curl -L -o test_file.png "https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
          else
            echo "Скачивание: ${INPUT_HASH}"
            aria2c --seed-time=0 --dir=. "${INPUT_HASH}"
          fi

      - name: Upload to Google Drive
        run: python3 scripts/upload_to_gdrive.py
