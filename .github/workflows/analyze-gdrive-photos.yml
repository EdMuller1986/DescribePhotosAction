name: Analyze Google Drive media with local YOLO

on:
  workflow_dispatch:
    inputs:
      drive_url:
        description: 'Google Drive folder URL (https://drive.google.com/drive/folders/ID) or folder ID'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  analyze:
    name: Analyze Google Drive images and videos
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
      GOOGLE_DRIVE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_OAUTH_CREDENTIALS }}
      GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
      GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN }}

      LOCAL_MODEL_PATH: ${{ vars.LOCAL_MODEL_PATH || 'yolo11n.pt' }}
      YOLO_CONFIDENCE: ${{ vars.YOLO_CONFIDENCE || '0.25' }}
      YOLO_IOU: ${{ vars.YOLO_IOU || '0.70' }}
      YOLO_IMAGE_SIZE: ${{ vars.YOLO_IMAGE_SIZE || '1280' }}
      YOLO_DEVICE: ${{ vars.YOLO_DEVICE || 'cpu' }}
      MAX_IMAGE_EDGE: ${{ vars.MAX_IMAGE_EDGE || '1600' }}
      MAX_DETECTIONS: ${{ vars.MAX_DETECTIONS || '300' }}

      PROCESS_IMAGES: ${{ vars.PROCESS_IMAGES || 'true' }}
      PROCESS_VIDEOS: ${{ vars.PROCESS_VIDEOS || 'true' }}
      SAVE_YOLO_TXT: ${{ vars.SAVE_YOLO_TXT || 'true' }}
      SAVE_EMPTY_YOLO_TXT: ${{ vars.SAVE_EMPTY_YOLO_TXT || 'true' }}
      CREATE_IMAGE_BOXES_PREVIEW: ${{ vars.CREATE_IMAGE_BOXES_PREVIEW || 'false' }}
      CREATE_BOXES_PREVIEW: ${{ vars.CREATE_BOXES_PREVIEW || 'false' }}

      ENABLE_VIDEO_TRACKING: ${{ vars.ENABLE_VIDEO_TRACKING || 'true' }}
      VIDEO_TRACKER: ${{ vars.VIDEO_TRACKER || 'bytetrack' }}
      VIDEO_FRAME_INTERVAL_SECONDS: ${{ vars.VIDEO_FRAME_INTERVAL_SECONDS || '1' }}
      VIDEO_MAX_FRAMES_PER_FILE: ${{ vars.VIDEO_MAX_FRAMES_PER_FILE || '300' }}
      SAVE_TRACK_PATHS: ${{ vars.SAVE_TRACK_PATHS || 'true' }}
      TRACK_PATH_MAX_POINTS: ${{ vars.TRACK_PATH_MAX_POINTS || '1000' }}

      PROCESS_MISSING_SIDE_OUTPUTS: ${{ vars.PROCESS_MISSING_SIDE_OUTPUTS || 'true' }}
      FORCE_REPROCESS: ${{ vars.FORCE_REPROCESS || 'false' }}
      MAX_FILES_PER_RUN: ${{ vars.MAX_FILES_PER_RUN || '0' }}
      JSON_INDENT: ${{ vars.JSON_INDENT || '2' }}
      FAIL_ON_ERRORS: ${{ vars.FAIL_ON_ERRORS || 'false' }}

    steps:
      - name: Delete previous workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${{ github.run_id }}"
          gh run list \
            --repo "${{ github.repository }}" \
            --workflow analyze-gdrive-photos.yml \
            --limit 200 \
            --json databaseId \
            --jq ".[] | select(.databaseId != ${CURRENT}) | .databaseId" | \
          while read -r run_id; do
            [ -n "$run_id" ] || continue
            gh run delete "$run_id" --repo "${{ github.repository }}" || true
          done

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse folder ID from input
        id: parse
        run: |
          INPUT="${{ inputs.drive_url }}"

          if [[ "$INPUT" =~ drive\.google\.com/.*/folders/([A-Za-z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
            echo "Detected Google Drive folder URL, ID: $FOLDER_ID"
          elif [[ "$INPUT" =~ drive\.google\.com/file/d/([A-Za-z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
            echo "Detected Google Drive file URL, ID: $FOLDER_ID"
          elif [[ "$INPUT" =~ \?id=([A-Za-z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
            echo "Detected Google Drive open URL, ID: $FOLDER_ID"
          elif [[ "$INPUT" =~ ^[A-Za-z0-9_-]+$ ]] && [ ${#INPUT} -ge 20 ]; then
            FOLDER_ID="$INPUT"
            echo "Detected bare folder ID: $FOLDER_ID"
          else
            echo "ERROR: cannot parse Google Drive folder URL or ID from: $INPUT"
            exit 1
          fi

          echo "folder_id=${FOLDER_ID}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analyze Google Drive media
        env:
          GDRIVE_FOLDER_ID: ${{ steps.parse.outputs.folder_id }}
        run: |
          python scripts/analyze_gdrive_photos.py