name: Analyze FTP photos

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze new FTP photos
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      FTP_URL: ${{ secrets.FTP_URL }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}

      FTP_PHOTO_DIR: ${{ vars.FTP_PHOTO_DIR || 'photo' }}
      FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL || 'ftp' }}
      FTP_PORT: ${{ vars.FTP_PORT || '' }}
      LOCAL_MODEL_PATH: ${{ vars.LOCAL_MODEL_PATH || 'yolo11n.pt' }}
      MAX_FILES_PER_RUN: ${{ vars.MAX_FILES_PER_RUN || '0' }}
      MAX_IMAGE_EDGE: ${{ vars.MAX_IMAGE_EDGE || '1600' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analyze FTP photos
        run: |
          python scripts/analyze_ftp_photos.py
      - name: Analyze images on FTP
        env:
          FTP_URL: ${{ secrets.FTP_URL }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PHOTO_DIR: ${{ vars.FTP_PHOTO_DIR }}
          LOCAL_MODEL_PATH: ${{ vars.LOCAL_MODEL_PATH }}
          YOLO_CONFIDENCE: ${{ vars.YOLO_CONFIDENCE }}
          YOLO_IOU: ${{ vars.YOLO_IOU }}
          YOLO_IMAGE_SIZE: ${{ vars.YOLO_IMAGE_SIZE }}
          YOLO_DEVICE: ${{ vars.YOLO_DEVICE }}
          MAX_DETECTIONS: ${{ vars.MAX_DETECTIONS }}
          MAX_FILES_PER_RUN: ${{ vars.MAX_FILES_PER_RUN }}
          MAX_IMAGE_EDGE: ${{ vars.MAX_IMAGE_EDGE }}
          JSON_INDENT: "2"
        run: python scripts/analyze_ftp_photos.py
